name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite deploy manual

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '18'

jobs:
  # Job 1: Tests antes de deploy
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build application
        run: npm run build

  # Job 2: Deploy a AWS Elastic Beanstalk
  deploy-elastic-beanstalk:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --production

      - name: 🏗️ Build application
        run: npm run build

      - name: 📦 Generate deployment package
        run: |
          zip -r deploy.zip . \
            -x '*.git*' \
            -x 'node_modules/*' \
            -x 'tests/*' \
            -x 'coverage/*' \
            -x '.env'

      - name: ☁️ Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🚀 Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: sazon-patrimonial-backend
          environment_name: sazon-backend-prod
          version_label: ${{ github.sha }}
          region: ${{ env.AWS_REGION }}
          deployment_package: deploy.zip
          wait_for_deployment: true
          wait_for_environment_recovery: 300

      - name: ✅ Deployment successful
        run: echo "🎉 Deployment to Elastic Beanstalk successful!"

  # Job 3: Deploy a AWS EC2 (alternativa)
  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && false  # Cambiar a true para activar

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."
            
            # Ir al directorio del proyecto
            cd /home/ec2-user/Sazon_Patrimonial-PI-Backend
            
            # Pull latest changes
            echo "📥 Pulling latest code..."
            git pull origin main
            
            # Install dependencies
            echo "📦 Installing dependencies..."
            npm ci --production
            
            # Build
            echo "🏗️ Building application..."
            npm run build
            
            # Restart PM2
            echo "🔄 Restarting application..."
            pm2 restart sazon-backend || pm2 start npm --name "sazon-backend" -- start
            
            # Save PM2 config
            pm2 save
            
            echo "✅ Deployment completed!"

      - name: 🔍 Verify deployment
        run: |
          echo "⏳ Waiting for application to start..."
          sleep 10
          
          echo "🔍 Checking health endpoint..."
          curl -f https://api.sazonpatrimonial.com/api/health || exit 1
          
          echo "✅ Health check passed!"

      - name: ✅ EC2 Deployment successful
        run: echo "🎉 Deployment to EC2 successful!"

  # Job 4: Notificaciones
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-elastic-beanstalk]
    if: always()

    steps:
      - name: 📧 Notify success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Environment: Production"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

      - name: ❌ Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Please check the logs for details."